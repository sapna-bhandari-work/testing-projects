[pytest]
# ── Test discovery ──────────────────────────────────────────────────────────
testpaths = tests

# ── Default options applied to every test run ───────────────────────────────
# --html          : generate an HTML report at reports/report.html
# --self-contained-html : embed CSS/JS inside the HTML file (no extra assets)
# -v              : verbose output (test IDs printed line-by-line)
# --tb=short      : concise traceback on failures
addopts =
    --html=reports/report.html
    --self-contained-html
    -v
    --tb=short

# ── Browser selection ────────────────────────────────────────────────────────
# Override at runtime with:  pytest --browser=firefox
# or via env var:            BROWSER=firefox pytest
browser = chrome

# ── Custom markers ───────────────────────────────────────────────────────────
markers =
    login:    All login-page tests
    positive: Tests expecting a successful login
    negative: Tests expecting a login failure / error message
    security: Tests exercising injection or malicious-input scenarios
    boundary: Tests using boundary-value inputs (e.g. 255-char strings)

# ── Logging ──────────────────────────────────────────────────────────────────
log_cli       = true
log_cli_level = INFO
log_format    = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %H:%M:%S
