[pytest]
# Directories pytest should collect tests from
testpaths = tests

# Add the python_suite root to sys.path so that `utils`, `data`, and
# `schemas` can be imported without package-prefix gymnastics.
pythonpath = .

# Default CLI options:
#   --html          : generate an HTML report at reports/report.html
#   --self-contained-html : embed all assets into a single file
#   -v              : verbose output (test name + PASSED/FAILED per line)
addopts =
    --html=reports/report.html
    --self-contained-html
    -v

# Markers used in this suite (prevents PytestUnknownMarkWarning)
markers =
    get: GET endpoint tests
    post: POST endpoint tests
    put: PUT endpoint tests
    delete: DELETE endpoint tests
    schema: JSON schema validation tests
    response_time: Response-time SLA tests
